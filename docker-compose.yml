services:
  postgres:
    image: postgres:16

    container_name: ignition_postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ignition
      POSTGRES_PASSWORD: ignitionpassword
      POSTGRES_DB: ignition

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ignition"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
